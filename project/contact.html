<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">"
        -->
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.min.css" rel="stylesheet">
    <title>Contact Us</title>
</head>

<body class="contact-body">
    <section class="header">
        <nav>
            <a href="home.html"><img src="logo.jpeg"></a>
            <div class="nav-links" id="navLinks">
                <i class="fa fa-times" onclick="hideMenu()"></i>
                <ul>
                    <li><a href="home.html">HOME</a></li>
                    <li><a href="our_work.html">OUR WORK</a></li>
                    <li><a href="contact.html">CONTACT US</a></li>
                </ul>
            </div>
            <i class="fa fa-bars" onClick="showMenu()"></i>
        </nav>
        <br>
        <br>
        <br>
        <div class="email-textbox">
            <h1 class="email-textbox">Submit an Email</h1>
        </div>
        <br>
        <br>
        <br>

        <section class="form-class" method="post">
            <form class="row g-3">
                <div class="col-md-6">
                <label for="inputName" class="form-label text-white">First Name</label>
                <input type="text" class="form-control" id="inputName">
                </div>
                <div class="col-md-6">
                <label for="inputName" class="form-label text-white">Last Name</label>
                <input type="text" class="form-control" id="inputName">
                </div>
                <div class="col-6">
                <label for="inputEmail" class="form-label text-white">Email Address</label>
                <input type="email" class="form-control" id="inputEmail" placeholder="email@mail.com">
                </div>
                <div class="col-6">
                <label for="inputZip" class="form-label text-white">Zip Code</label>
                <input type="number" class="form-control" id="inputZip" >
                </div>
                <div class="col-md-12">
                <label for="inputAddress" class="form-label text-white">Email Subject</label>
                <input type="text" class="form-control" id="inputAddress" placeholder="123 main st">
                </div>
                <div class="form-group">
                    <label for="exampleFormControlTextarea1" class="form-label text-white">What can we do for you?</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                </div>
                </div>
                <div class="col-12 text-center">
                <button type="submit" class="hero-btn btn-light">Send Email</button>
                </div>
            </form>
        </section>

    </section>

    <section class="footer">

        <h4>Website created by Ethan Cronin</h4>
        <div class="icons">
            <p><i class="fa fa-phone"></i> (423) 736-9919</p>
            <i class="fa fa-facebook"></i>
        </div>
    </section>

    <!---- JavaScript for menu toggling -->
    <script>

        var navLinks = document.getElementById("navLinks");

        function showMenu(){
            navLinks.style.right = "0" // edits the right value from css
        }

        function hideMenu(){
            navLinks.style.right = "-250px";
        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</body>

</html>
